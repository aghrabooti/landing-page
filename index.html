<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <!-- navbar and hero section -->
    <header>
        <!-- navbar -->
        <div class="container">
            <nav>
                <div class="navbar">
                    <!-- navbar logo -->
                    <div id="navbar-logo"><strong>header logo</strong></div>
                    <!-- navbar links -->
                    <div id="navbar-link">
                        <a href="#">header link one</a>
                        <a href="#">header link two</a> 
                        <a href="#">header link three</a>
                    </div>
                </div>
            </nav>
            <!-- hero section -->
            <div class="heroSection">
                <!-- texts and button -->
                <div id="heroSection-text">
                    <h1 id="heroSection-title">This website is awesome!</h1>
                    <p id="heroSection-subtext">This website has some subtext that goes here under the main
                        title. It's a similar font and the color is lower contrast
                    </p>
                    <!-- button -->
                 <div>
                    <button class="heroSection-button">Sign up</button>
                 </div>
                </div>
                <!-- image -->  
                <div  id="heroSection-image-container">
                    <img id="heroSection-image" src="./images/hero-section_image.jpg" alt="hero section image">
                </div>
                
            </div>
        </div>
        
    </header>
</body>
</html>
